<!DOCTYPE html>
<html>
<head>
  <title>Russell Family Tree (1857 to 2026)</title>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f8fafc;
      color: #1e293b;
    }

    h4 {
      font-size: 18px;
      font-weight: 400;
      color: #475569;
      margin: 0 0 32px 0;
      text-align: center;
    }

    .page-title {
      font-size: 20px;
      font-weight: 700;
      color: #0f172a;
      margin: 80px 0 10px 0;
      text-align: center;
      letter-spacing: -0.5px;
    }

    .node circle, .node rect {
      fill: #fff;
      stroke-width: 1.5px;
    }

    .decade circle {
      fill: none;
      stroke: #e2e8f0;
      stroke-width: 0.5px;
    }

    .decade-1900 circle,
    .decade-1950 circle,
    .decade-2000 circle {
      stroke: #ccc;
      stroke-width: 0.5px;
    }

    .node {
      font: 12px 'Inter', sans-serif;
      opacity: 0.7;
    }

    .nodeName0 {
      font: 13px 'Inter', sans-serif;
      opacity: 1;
      font-weight: 600;
    }

    .nodeName1 {
      font: 10.5px 'Inter', sans-serif;
    }

    .decade {
      font: 12px 'Inter', sans-serif;
      fill: #94a3b8;
      opacity: 0.7;
    }

    .title {
      font: 14px 'Inter', sans-serif;
      font-weight: 700;
      fill: #334155;
    }

    .link {
      fill: none;
      opacity: 0.27;
      stroke-width: 1.5px;
    }
  </style>
</head>
<body>
  <h1 class="page-title">The Russell Family Tree</h1>
  <h4>1857 to 2026</h4>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/3.5.5/d3.min.js"></script>
<script>

var diameter = 1200;

function yearToY(year) {
  const a = year - 1857;
  // if (year <= 1940) {
  //   return (year-1857)*2.3;
  // }
  // if (year > 1940 && year <= 1970) {
  //   return ((year-1857)*4.5) - 180;
  // }
  // else {
  //   return ((year-1857)*4.1) - 120;
  // }

  // return (year-1857)*3.5;

  if (year <= 1940) {
    return (year-1857)*2.2;
  }
  if (year > 1940 && year <= 1960) {
    return ((year-1857)*3.5) - 120;
  }
  else {
    return ((year-1857)*4.6) - 210;
  }
}

function getY(d) { 
  //return d.y;
  return yearToY(d.born);
};

function colorScale(name) {
  // console.log('colorScale name: ', name);
  if (name === 'Hilda m Patrick Fennell') {
    return '#81C784';
  }
  if (name === 'Jim m Carmel Moran') {
    return '#FF5252';
  }
  if (name === 'Frances m Daniel Heffernan') {
    return '#448AFF';
  }
  if (name === 'John m Evelyn Walsh') {
    return '#FFD740';
  }
  if (name === '') { // root node
    return '#ccc';
  }
  return '#ccc';
}
  
function getBranchColor(d) {
  // d is the link object. We traverse up from the target node.
  let current = d.target;
  let source = d.source;

  if (source.firstname === '') {
    // If the source is the root node, we can use its color directly.
    return colorScale(source.firstname);
  }

  if (current == null) {
    console.log('null circle..');
    return colorScale(current);
  }
  
  // Walk up the tree until the current node's parent is the root.
  // We know a node is the root if it has no parent (parent is null/undefined).
  while (current.parent && current.parent.parent) {
  // while (current.parent.parent) {
    current = current.parent;
  }
  
  // Now 'current' is the level 1 ancestor (root + 1).
  // We feed a unique identifier (like name or ID) into the color scale.
  return colorScale(current.firstname); 
}

function getCircleColor(d) {
  if (d == null) {
    console.log('null circle..');
    return colorScale(current);
  }
  
  // Walk up the tree until the current node's parent is the root.
  // We know a node is the root if it has no parent (parent is null/undefined).
  while (d.parent && d.parent.parent) {
  // while (current.parent.parent) {
    d = d.parent;
  }
  
  // Now 'current' is the level 1 ancestor (root + 1).
  // We feed a unique identifier (like name or ID) into the color scale.
  return colorScale(d.firstname); 
}


var tree = d3.layout.tree()
    .size([360, diameter / 2 - 120])
    .separation(function(a, b) { return (a.parent == b.parent ? 1 : 2) / a.depth; });

var diagonal = d3.svg.diagonal.radial()
    .source(function(d){ 
        if(d.source.firstname=="") 
          return {x: d.target.x, y: getY(d.source)}; 
        else 
          return {x: d.source.x, y: getY(d.source)};
      })
    .target(function(d){ return {x: d.target.x, y: getY(d.target)};})
    .projection(function(d) { return [d.y, d.x / 180 * Math.PI]; });

var svg = d3.select("body").append("svg")
    .attr("width", diameter)
    .attr("height", diameter)
  .append("g")
    .attr("transform", "translate(" + diameter / 2 + "," + diameter / 2 + ")");

d3.json("./raw_data/family.json", function(error, root) {
  if (error) throw error;

  var nodes = tree.nodes(root),
      links = tree.links(nodes);

  var link = svg.selectAll(".link")
      .data(links)
    .enter().append("path")
      .attr("class", "link")
      .attr("d", diagonal)
      .style("stroke", getBranchColor);

  var decade = svg.selectAll(".decade")
      .data([1860,1870,1880,1890,1900,1910,1920,1930,1940,1950,1960,1970,1980,1990,2000,2010,2020])
      .enter().append("g")
      .attr("class", function(d) { return "decade decade-" + d; });
      // .attr("class", "spanner");

  decade.append("circle")
      .attr("r", function(d){return yearToY(d)});

  decade.append("text")
      .attr("dy", ".31em")
      .attr("transform", function(d) { return "translate(-10,-"+yearToY(d)+")" })
      .text(function(d) { return d; });

  svg.selectAll(".title")
    .data(["William Russell & Ellen Cahill"])
    .enter().append("text")
      .attr("class", "title")
      .attr("transform", function(d) { return "translate(-90,20)" })
      .text(function(d) { return d; });

  var node = svg.selectAll(".node")
      .data(nodes)
    .enter().append("g")
      .attr("class", "node")
      .attr("transform", function(d) { return "rotate(" + (d.x - 90) + ")translate(" + getY(d) + ")"; })

  var c = d3.scale.category10();
  console.log('appending circle..');
  node.append("circle")
      .attr("r", 4.5)
      .attr("stroke", getCircleColor); 
          // function(d){return c(d.depth)});
  
  node.append("text")
      .attr("dy", ".31em")
      .attr("text-anchor", function(d) { return d.x < 180 ? "start" : "end"; })
      .attr("transform", function(d) { return d.x < 180 ? "translate(8)" : "rotate(180)translate(-8)"; })
      .each(function(d) {
        // Split your string into an array of words/lines (e.g., by spaces or newlines)
        var words = d.firstname.split(" m ");
        var text = d3.select(this);

        // Loop through each word/line and append as a <tspan>
        words.forEach(function(word, i) {
            let w = word;
            if (i > 0) {
              w = 'm ' + w;
            }
            text.append("tspan")
                .text(w)
                .attr("x", 0) // Align to the node center/left
                .attr("dy", i === 0 ? 0 : "1.2em") // Offset subsequent lines
                .attr("class", "nodeName" + i);
        });
    });
});

d3.select(self.frameElement).style("height", diameter - 150 + "px");

</script>
</body>
</html>
